name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  package:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y pkg-config zip xz-utils
      - run: make tg5040-bootstrap
      - run: make nextui-release
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/RaceSlate.pak.zip
            dist/RaceSlate.pakz
          generate_release_notes: true
